name = "amankumarrouniyar"
type = "javascript"
account_id = ""
workers_dev = true
route = ""
zone_id = ""
compatibility_date = "2024-04-01"

[build]
cwd = "."
command = "npm install && npm run build"
watch_paths = ["src/**/*.tsx", "src/**/*.ts"]

[build.upload]
format = "modules"

[env.production]
route = "amankumarrouniyar.pages.dev"

[[routes]]
pattern = "amankumarrouniyar.pages.dev/*"
